name: Build Voyage ETA for Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout Voyage ETA
        uses: actions/checkout@v4
        with:
          path: voyage_eta_src

      - name: Checkout OpenCPN testplugin template
        uses: actions/checkout@v4
        with:
          repository: jongough/testplugin_pi
          path: buildtree
          submodules: recursive

      - name: Overlay Voyage ETA source
        shell: pwsh
        run: |
          Copy-Item "voyage_eta_src\src\*" "buildtree\src\" -Force
          Copy-Item "voyage_eta_src\README.md" "buildtree\README.md" -Force
          Copy-Item "voyage_eta_src\LICENSE" "buildtree\LICENSE" -Force

      - name: Install build tools
        shell: pwsh
        run: |
          choco install cmake ninja gettext wget 7zip -y --no-progress

          $gettextExe = Get-ChildItem "C:\Program Files\gettext-iconv" `
            -Recurse `
            -Filter "msgfmt.exe" `
            -ErrorAction SilentlyContinue |
            Select-Object -First 1

          if (-not $gettextExe) {
            throw "msgfmt.exe was not found."
          }

          Add-Content -Path $env:GITHUB_PATH `
            -Value $gettextExe.Directory.FullName

      - name: Prepare Win32 wxWidgets
        shell: pwsh
        working-directory: buildtree
        run: |
          $wxRoot = "$PWD\cache\wxWidgets-3.2.1"
          New-Item -ItemType Directory -Force $wxRoot | Out-Null

          $baseUrl = "https://github.com/wxWidgets/wxWidgets/releases/download/v3.2.1"

          wget -nv --no-check-certificate `
            "$baseUrl/wxMSW-3.2.1_vc14x_Dev.7z" `
            -O wx-win32.7z

          wget -nv --no-check-certificate `
            "$baseUrl/wxWidgets-3.2.1-headers.7z" `
            -O wx-headers.7z

          7z x wx-win32.7z "-o$wxRoot" -y
          7z x wx-headers.7z "-o$wxRoot" -y

      - name: Configure
        shell: pwsh
        working-directory: buildtree
        run: |
          $wxRoot = "$PWD\cache\wxWidgets-3.2.1"
          $wxLib = "$wxRoot\lib\vc14x_dll"

          New-Item -ItemType Directory -Force build | Out-Null

          cmake -S . -B build -A Win32 `
            -DOCPN_TARGET=MSVC `
            "-DwxWidgets_ROOT_DIR=$wxRoot" `
            "-DwxWidgets_LIB_DIR=$wxLib" `
            -DwxWidgets_CONFIGURATION=mswu `
            -DwxWidgets_USE_STATIC=OFF `
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: pwsh
        working-directory: buildtree
        run: |
          cmake --build build --config Release --parallel 2

      - name: Create importable Voyage ETA package
        shell: pwsh
        run: |
          $dll = Get-ChildItem "buildtree\build" `
            -Recurse `
            -Filter "testplugin_pi.dll" |
            Select-Object -First 1

          if (-not $dll) {
            throw "Compiled plugin DLL was not found."
          }

          New-Item -ItemType Directory -Force package\plugins | Out-Null
          Copy-Item $dll.FullName "package\plugins\testplugin_pi.dll" -Force

          @'
<?xml version="1.0" encoding="UTF-8"?>
<opencpn-plugin>
  <name>Voyage ETA</name>
  <version>1.0.0</version>
  <release>1</release>
  <summary>ETA to destination or selected route waypoint</summary>
  <description>Calculates ETA using live SOG or manually entered speed.</description>
  <author>Captain Voyage ETA</author>
  <api-version>1.18</api-version>
  <target>msvc-wx32</target>
  <target-version>10.0.20348</target-version>
  <tarball-url>VoyageETA-1.0.0-msvc-wx32.tar.gz</tarball-url>
  <info-url>https://github.com/s4angeloquebral-ai/VoyageETA_pi</info-url>
</opencpn-plugin>
'@ | Set-Content "package\metadata.xml" -Encoding UTF8

          tar -czf VoyageETA-1.0.0-msvc-wx32.tar.gz -C package .

          New-Item -ItemType Directory -Force artifacts | Out-Null
          Copy-Item "VoyageETA-1.0.0-msvc-wx32.tar.gz" artifacts\ -Force
          Copy-Item $dll.FullName artifacts\ -Force

      - name: Upload Voyage ETA
        uses: actions/upload-artifact@v4
        with:
          name: VoyageETA-Windows
          path: artifacts
