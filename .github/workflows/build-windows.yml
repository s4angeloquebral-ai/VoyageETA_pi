
name: Build Voyage ETA for Windows

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout Voyage ETA
        uses: actions/checkout@v4
        with:
          path: voyage_eta_src

      - name: Checkout OpenCPN testplugin template
        uses: actions/checkout@v4
        with:
          repository: jongough/testplugin_pi
          path: buildtree
          submodules: recursive

      - name: Overlay Voyage ETA source
        shell: pwsh
        run: |
          Copy-Item voyage_eta_src\src\* buildtree\src\ -Force
          Copy-Item voyage_eta_src\README.md buildtree\README.md -Force
          Copy-Item voyage_eta_src\LICENSE buildtree\LICENSE -Force

      - name: Install build tools
        shell: pwsh
        run: |
          choco install cmake ninja visualstudio2022buildtools `
            visualstudio2022-workload-vctools -y --no-progress

      - name: Prepare dependencies
        shell: pwsh
        working-directory: buildtree
        run: |
          choco install wget 7zip -y --no-progress

          $wxRoot = "$PWD\cache\wxWidgets-3.2.1"
          New-Item -ItemType Directory -Force $wxRoot | Out-Null

          $baseUrl = "https://github.com/wxWidgets/wxWidgets/releases/download/v3.2.1"

          wget -nv --no-check-certificate `
            "$baseUrl/wxMSW-3.2.1_vc14x_x64_Dev.7z" `
            -O wx-x64.7z

          wget -nv --no-check-certificate `
            "$baseUrl/wxWidgets-3.2.1-headers.7z" `
            -O wx-headers.7z

          7z x wx-x64.7z "-o$wxRoot" -y
          7z x wx-headers.7z "-o$wxRoot" -y

          Write-Host "wxWidgets folders:"
          Get-ChildItem "$wxRoot\lib" -Directory

      - name: Configure
        shell: pwsh
        working-directory: buildtree
        run: |
          $wxRoot = "$PWD\cache\wxWidgets-3.2.1"
          $wxLib = "$wxRoot\lib\vc14x_x64_dll"

          if (-not (Test-Path $wxRoot)) {
            throw "wxWidgets root folder is missing: $wxRoot"
          }

          if (-not (Test-Path $wxLib)) {
            Write-Host "Folders found under wxWidgets lib:"
            Get-ChildItem "$wxRoot\lib" -Directory
            throw "wxWidgets x64 library folder is missing: $wxLib"
          }

          New-Item -ItemType Directory -Force build | Out-Null

          cmake -S . -B build -A x64 `
            -DOCPN_TARGET=MSVC `
            "-DwxWidgets_ROOT_DIR=$wxRoot" `
            "-DwxWidgets_LIB_DIR=$wxLib" `
            -DwxWidgets_CONFIGURATION=mswu `
            -DwxWidgets_USE_STATIC=OFF
      - name: Build
        shell: pwsh
        working-directory: buildtree
        run: |
          cmake --build build --config Release --parallel 2

      - name: Package
        shell: pwsh
        working-directory: buildtree
        run: |
          cmake --build build --config Release --target package
          Get-ChildItem -Recurse build | Where-Object {
            $_.Name -match '\.(tar\.gz|zip|dll)$'
          } | ForEach-Object {
            Copy-Item $_.FullName "$env:GITHUB_WORKSPACE\artifacts\" -Force
          }

      - name: Upload plugin files
        uses: actions/upload-artifact@v4
        with:
          name: VoyageETA-Windows-x64
          path: artifacts
